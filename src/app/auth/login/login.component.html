<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="text-heading-2">Welcome Back</h2>
      <p class="text-body">Sign in to your account to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control" 
          placeholder="Enter your email"
          [class.error]="email?.invalid && (email?.dirty || email?.touched)"
        >
        <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="form-error">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          placeholder="Enter your password"
          [class.error]="password?.invalid && (password?.dirty || password?.touched)"
        >
        <div *ngIf="password?.invalid && (password?.dirty || password?.touched)" class="form-error">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="form-group flex-row justify-content-between align-items-center">
        <div class="form-check">
          <input type="checkbox" id="rememberMe" formControlName="rememberMe" class="form-check-input">
          <label for="rememberMe" class="form-check-label text-small">Remember me</label>
        </div>
        <a routerLink="/forgot-password" class="text-small text-primary">Forgot password?</a>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error mb-3">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="d-flex align-items-center justify-content-center">
          <span class="loading-spinner mr-2"></span>
          Signing in...
        </span>
      </button>
    </form>

    <div class="auth-footer text-center">
      <p class="text-body">Don't have an account? <a routerLink="/signup" class="text-primary">Sign up</a></p>
    </div>
  </div>
</div>
